<h2>Book An Appointment</h2>

<form>

<input type="text" placeholder="Enter Full Name" required>

<input type="email" placeholder="Enter Email Address" required>

<input type="tel" placeholder="Enter Phone Number" required>

<select required>

<option>Select Service</option>

<option>Classic Lashes</option>
<option>Volume Lashes</option>
<option>Hybrid Lashes</option>
<option>Nail Services</option>
<option>Hair Wash</option>
<option>Hair Treatment</option>
<option>Hair Installation</option>
<option>Installation + Styling</option>

</select>

<input type="date" required>

<input type="time" required>

<textarea rows="5" placeholder="Additional Notes"></textarea>

<button type="submit">Book Appointment</button>

</form>
